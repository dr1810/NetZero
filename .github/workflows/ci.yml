name: NetZero CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Backend Dependencies
        run: |
          cd netzero-backend
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          cd netzero-backend
          python manage.py test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        run: |
          cd netzero-frontend
          npm install

      - name: Build Frontend
        run: |
          cd netzero-frontend
          npm run build