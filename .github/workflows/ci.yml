name: NetZero CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        working-directory: netzero-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: netzero-backend
        run: |
          python manage.py test 2>&1 | tee backend-test.log

      - name: Publish backend test summary
        if: always()
        working-directory: netzero-backend
        run: |
          TEST_COUNT=$(grep -Eo 'Ran [0-9]+ test' backend-test.log | tail -1 | awk '{print $2}')
          if [ -z "$TEST_COUNT" ]; then TEST_COUNT="unknown"; fi
          {
            echo "## Backend Tests"
            echo "- Django test suite executed"
            echo "- Tests run: ${TEST_COUNT}"
            echo "- Full logs are available in the job output."
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: netzero-frontend
        run: npm ci

      - name: Frontend lint
        working-directory: netzero-frontend
        run: npm run lint 2>&1 | tee frontend-lint.log

      - name: Frontend unit tests (Vitest)
        working-directory: netzero-frontend
        run: npm run test:run 2>&1 | tee frontend-test.log

      - name: Frontend build
        working-directory: netzero-frontend
        run: npm run build 2>&1 | tee frontend-build.log

      - name: Publish frontend test summary
        if: always()
        working-directory: netzero-frontend
        run: |
          {
            echo "## Frontend Checks"
            echo "- Lint: completed"
            echo "- Unit tests (Vitest): completed"
            echo "- Build (includes TypeScript checks): completed"
            echo "- Full logs are available in the job output."
          } >> "$GITHUB_STEP_SUMMARY"

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install backend dependencies
        working-directory: netzero-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration test suite
        working-directory: netzero-backend
        run: |
          python manage.py test \
            api.tests.test_building_api \
            api.tests.test_retrofit_simulation \
            api.tests.test_report_generation \
            api.tests.test_portfolio \
            api.tests.test_carbon_preferences_api \
            api.tests.test_carbon_preference_api \
            api.tests.test_auth_email_verification \
            api.tests.test_carbon_monitoring_api \
            2>&1 | tee integration-test.log

      - name: Publish integration test summary
        if: always()
        working-directory: netzero-backend
        run: |
          TEST_COUNT=$(grep -Eo 'Ran [0-9]+ test' integration-test.log | tail -1 | awk '{print $2}')
          if [ -z "$TEST_COUNT" ]; then TEST_COUNT="unknown"; fi
          {
            echo "## Integration Tests"
            echo "- API integration-focused Django tests executed"
            echo "- Tests run: ${TEST_COUNT}"
            echo "- Full logs are available in the job output."
          } >> "$GITHUB_STEP_SUMMARY"