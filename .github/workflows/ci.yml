frontend-build:
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20.x   # ✅ FIXED (was 18)

    - name: Install frontend dependencies
      working-directory: netzero-frontend
      run: npm install

    - name: Build frontend
      working-directory: netzero-frontend
      run: npm run build